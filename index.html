<!DOCTYPE html>
<html lang="en">
<head>
<meta name="google-site-verification" content="gavU78xZQQGVTWHubglJR1E-v3fhA1CSrHHO0fy41Kg" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5,000 Image Gallery - Infinite Scroll</title>
<style>
body { margin:0; font-family: Arial,sans-serif; background:#fafafa; }
header { background:#222; color:#fff; padding:20px; text-align:center; }
header input { width:80%; max-width:400px; padding:8px; border-radius:5px; border:none; margin-top:10px; }
#gallery { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:15px; padding:15px; }
.card { background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.12); }
.card img { width:100%; height:160px; object-fit:cover; display:block; }
.card h3 { margin:10px; font-size:1.1em; }
.card p { margin:0 10px 10px; color:#555; font-size:0.85em; line-height:1.2em; white-space: pre-line; }
.loading { text-align:center; padding:20px; font-size:1.2em; color:#555; }
</style>
</head>
<body>

<header>
<h1>Professional 5,000 Image Gallery</h1>
<input type="text" id="search" placeholder="Search images...">
</header>

<div id="gallery"></div>
<div class="loading" id="loading">Loading...</div>

<script>
const gallery = document.getElementById("gallery");
const loading = document.getElementById("loading");
const searchInput = document.getElementById("search");

const totalImages = 5000;
let loadedCount = 0;
const batchSize = 20; // Number of images to load per scroll
let allImages = [];
let filteredImages = [];
let searchQuery = "";

// Generate all images with realistic 4-line descriptions
for (let i = 1; i <= totalImages; i++) {
  allImages.push({
    title: `Image ${i}`,
    description: `This is image number ${i}.\nA beautiful scene captured in natural light.\nPerfect for web or print.\nHigh-quality and visually appealing.`,
    img: `https://picsum.photos/seed/photo${i}/400/300`
  });
}

// Filter images based on search
function applyFilter(query) {
  searchQuery = query.toLowerCase();
  filteredImages = allImages.filter(p => 
    p.title.toLowerCase().includes(searchQuery) || 
    p.description.toLowerCase().includes(searchQuery)
  );
  loadedCount = 0;
  gallery.innerHTML = "";
  loadMoreImages();
}

// Load next batch of images
function loadMoreImages() {
  if (loadedCount >= filteredImages.length) {
    loading.innerText = "All images loaded";
    return;
  }
  const end = Math.min(loadedCount + batchSize, filteredImages.length);
  for (let i = loadedCount; i < end; i++) {
    const p = filteredImages[i];
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<img loading="lazy" src="${p.img}" alt="${p.title}">
                      <h3>${p.title}</h3>
                      <p>${p.description}</p>`;
    gallery.appendChild(card);
  }
  loadedCount = end;
  loading.innerText = "Scroll down to load more...";
}

// Infinite scroll
window.addEventListener("scroll", () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
    loadMoreImages();
  }
});

// Search input
searchInput.addEventListener("input", (e) => {
  applyFilter(e.target.value);
});

// Initialize
filteredImages = allImages;
loadMoreImages();
</script>

</body>
</html>
